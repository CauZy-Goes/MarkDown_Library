name: Atualiza README com resumo dos arquivos .md

on:
  push:
    branches:
      - main
    paths:
      - "**.md"
      - "!README.md"
  workflow_dispatch:

concurrency:
  group: readme-update
  cancel-in-progress: true

jobs:
  build-readme:
    # evita loop infinito: não roda se o commit foi feito pelo próprio bot
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Montar prompt.txt
        run: python build_prompt.py

      - name: Gerar README via IA
        env:
          API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          python gerar_readme.py

      - name: Commit e push do README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --cached --quiet; then
            echo "Nenhuma alteração no README, nada para commitar."
            exit 0
          fi

          git commit -m "docs: atualiza README automaticamente [skip ci]"
          git pull --rebase origin main
          git push origin main
