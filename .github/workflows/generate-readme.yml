name: Gerar README automaticamente 

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"   # evita loop infinito (o próprio workflow atualiza o README)

permissions:
  contents: write   # necessário para o workflow poder commitar de volta
  models: read       # necessário para usar o GitHub Models com o GITHUB_TOKEN

concurrency:
  group: readme-update
  cancel-in-progress: true

jobs:
  generate-readme:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'   # segurança extra contra loop

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Montar o prompt com o conteúdo de todos os .md
        run: python scripts/build_prompt.py

      - name: Gerar o resumo com IA (GitHub Models)
        id: inference
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4.1
          prompt-file: prompt.txt
          system-prompt: |
            Você é um assistente que gera arquivos README.md para repositórios
            de documentação. Para cada arquivo .md recebido, escreva uma seção
            com o nome do arquivo como título e um resumo objetivo contendo uma breve conceito e os
            principais comandos da tecnologia(cmd) e oque o comando faz. Responda em português do Brasil,
            usando Markdown válido, sem explicações fora do README em si.

      - name: Escrever o README.md gerado
        env:
          README_CONTENT: ${{ steps.inference.outputs.response }}
        run: |
          python -c "
          import os
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(os.environ['README_CONTENT'])
          "

      - name: Commitar e enviar o README atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: atualiza README automaticamente"
          git fetch origin main
          git rebase origin/main || git rebase --abort
          git push origin main
